map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# Redirect www to apex
server {
    listen 80;
    server_name www.visionmentors.org;

    return 301 https://visionmentors.org$request_uri;
}

# Public website — visionmentors.org
server {
    listen 80;
    server_name visionmentors.org;

    client_max_body_size 12M;

    location / {
        proxy_pass http://ngo-website:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
}

# Admin dashboard — admin.visionmentors.org
server {
    listen 80;
    server_name admin.visionmentors.org;

    client_max_body_size 12M;

    location / {
        proxy_pass http://admin:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
}
